<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Snickerdoodlez</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.google.com/recaptcha/api.js"></script>

    <script>
      // 2. Callback function to handle the token and open email
      function onSubmit(token) {
        console.log("reCAPTCHA Token verified:", token);
        const email = "admin@snickerdoodlez.online";
        const subject = encodeURIComponent("Contact from Word Pairing Machine");
        window.location.href = `mailto:${email}?subject=${subject}`;
      }
    </script>

    <style>
        :root {
            --neon-blue: #00E5FF;
            --neon-pink: #FF1FBF;
            --neon-orange: #FF6A00;
            --neon-green: #00FF66;
            --neon-violet: #9B00FF;
            --astro-gold: #FFD93D;
            --background: #000000;
            --astro-void: #111111;
            --radius-medium: 14px;
            --radius-large: 22px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Oswald', sans-serif;
        }

        body {
            background-color: var(--background);
            background-image: 
                radial-gradient(rgba(243, 232, 192, 0.1) 1px, transparent 1px),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.04));
            background-size: 20px 20px, 100% 4px, 100% 100%;
            color: #F7F7FF;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 3. Hide the reCAPTCHA Badge */
        .grecaptcha-badge { 
            visibility: hidden; 
        }

        header {
            padding: 1.5rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid #222;
        }

        .nav-link {
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .nav-link:hover {
            text-shadow: 0 0 10px var(--neon-blue);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .contact-card {
            background: var(--astro-void);
            border: 2px solid var(--neon-blue);
            border-radius: var(--radius-large);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.15);
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            text-align: center;
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 2rem;
            letter-spacing: 4px;
        }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            color: var(--neon-green);
            font-size: 1.1rem;
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            background: #000;
            border: 1px solid var(--neon-violet);
            border-radius: var(--radius-medium);
            color: white;
            font-family: 'Raleway', sans-serif;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        /* Styling the reCAPTCHA button */
        .g-recaptcha {
            width: 100%;
            padding: 1.2rem;
            background: transparent;
            border: 2px solid var(--neon-pink) !important;
            border-radius: var(--radius-medium);
            color: var(--neon-pink);
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .g-recaptcha:hover {
            background: var(--neon-pink) !important;
            color: #000 !important;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .direct-contact {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed var(--neon-orange);
            text-align: center;
        }

        .email-link {
            color: var(--astro-gold);
            text-decoration: none;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        footer {
            padding: 2rem;
            text-align: center;
            background: #050505;
            border-top: 1px solid #222;
        }

        .compliance-text {
            opacity: 0.3;
            font-size: 0.75rem;
            margin-bottom: 1.5rem;
            font-family: 'Raleway', sans-serif;
            line-height: 1.4;
        }

        .label-tag {
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--neon-orange);
            color: #000;
            padding: 4px 14px;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="nav-link">← Return to Machine</a>
    </header>

    <main>
        <div class="contact-card">
            <div class="label-tag">SECURE CHANNEL</div>
            <h1>Contact</h1>
            
            <form id="contact-form">
                <div class="form-group">
                    <label>User Identity</label>
                    <input type="text" name="name" placeholder="Enter name..." required>
                </div>

                <div class="form-group">
                    <label>Return Path</label>
                    <input type="email" name="email" placeholder="Enter email..." required>
                </div>

                <div class="form-group">
                    <label>Data Packet</label>
                    <textarea name="message" rows="4" placeholder="Write your message..."></textarea>
                </div>

                <button class="g-recaptcha" 
                        data-sitekey="6Lch4GgsAAAAAEhgqpzvb6cD06476rInsqtOi-dG" 
                        data-callback='onSubmit' 
                        data-action='submit'>
                    Initialize Link
                </button>
            </form>

            <div class="direct-contact">
                <label style="font-size: 0.9rem; opacity: 0.8;">Admin Support</label>
                <a href="mailto:admin@snickerdoodlez.online" class="email-link">admin@snickerdoodlez.online</a>
            </div>
        </div>
    </main>

    <footer>
        <p style="opacity: 0.5; font-size: 0.9rem; margin-bottom: 0.5rem;">© 2026 Word Pairing Machine</p>
        
        <p class="compliance-text">
            This site is protected by reCAPTCHA and the Google 
            <a href="https://policies.google.com/privacy" style="color: inherit; text-decoration: underline;">Privacy Policy</a> and 
            <a href="https://policies.google.com/terms" style="color: inherit; text-decoration: underline;">Terms of Service</a> apply.
        </p>

        <a href="index.html" class="nav-link" style="font-size: 1rem;">Back to Home</a>
    </footer>

</body>
</html>
